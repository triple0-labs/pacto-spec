apiVersion: pacto/v1alpha1
kind: Plugin
metadata:
  id: acme-guardrails
  version: 0.1.0
  priority: 100
spec:
  cliGuardrails:
    - id: require-clean-worktree
      commands: [new, move, exec, install, update, init, explore]
      run:
        script: scripts/check-clean.sh
        timeoutMs: 5000
      onFail:
        message: Working tree must be clean before mutating commands.
  agentGuardrails:
    - id: status-before-exec
      tools: [codex, cursor, claude, opencode]
      workflows: [exec, move, new]
      markdownFile: guardrails/status-before-exec.md
